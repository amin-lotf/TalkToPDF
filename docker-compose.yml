services:
  app:
    build: .
    image: aminook/talktopdf:0.2.0
    container_name: talk_app
    env_file:
      - .env.docker
    environment:
      SQLALCHEMY_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/talk_to_pdf
      DEFAULT_GROBID_URL: http://grobid:8070
    ports:
      - "8000:8000"
    depends_on:
      - db
      - grobid

  streamlit:
    image: aminook/talktopdf:0.2.0
    profiles:
      - streamlit
    env_file:
      - .env.docker
    environment:
      API_BASE_URL: http://app:8000/api/v1
    command: >
      sh -c "streamlit run src/talk_to_pdf/frontend/streamlit_app/main.py
      --server.address ${STREAMLIT_HOST:-0.0.0.0}
      --server.port ${STREAMLIT_PORT:-8501}"
    ports:
      - "${STREAMLIT_PORT:-8501}:${STREAMLIT_PORT:-8501}"
    depends_on:
      - app

  react:
    image: node:22-alpine
    container_name: talk_app_react
    profiles:
      - react
    working_dir: /app/src/talk_to_pdf/frontend/react
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
      VITE_WS_URL: ws://localhost:8000/api/v1/live/ws
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - react_node_modules:/app/src/talk_to_pdf/frontend/react/node_modules
    ports:
      - "${REACT_PORT:-5173}:${REACT_PORT:-5173}"
    depends_on:
      - app


  db:
    image: pgvector/pgvector:pg16
    container_name: talk_db
    environment:
      POSTGRES_DB: talk_to_pdf
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d

  grobid:
    image: lfoppiano/grobid:latest-full
    container_name: grobid
    environment:
      JAVA_OPTS: "-Xms1g -Xmx4g"

volumes:
  pgdata:
  react_node_modules:
